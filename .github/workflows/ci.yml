name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: conferencetest
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, pdo, pdo_mysql

      - name: Installer les dépendances
        run: composer install

      - name: Créer la BDD de test
        run: |
          php bin/console doctrine:database:create --env=test
          php bin/console doctrine:migrations:migrate --env=test --no-interaction
        env:
          DATABASE_URL: mysql://root:${{ secrets.DB_PASSWORD }}@127.0.0.1:3306/conferencetest

      - name: Vérifier le style du code
        run: composer cs

      - name: Lancer PHPStan
        run: composer stan

      - name: Donner les permissions à phpunit
        run: chmod +x bin/phpunit

      - name: Lancer les tests
        run: composer test
        env:
          DATABASE_URL: mysql://root:${{ secrets.DB_PASSWORD }}@127.0.0.1:3306/conferencetest